<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Fontos kérdés 💕</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe0f0, #f0e0ff);
            overflow: hidden;
        }

        /* ===== KÉRDÉS BOX ===== */
        .kerdes-box {
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 28px;
            color: #c2185b;
            margin-bottom: 30px;
        }

        /* ===== GOMBOK ===== */
        .gombok {
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .valasz-btn {
            padding: 15px 35px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            pointer-events: none; /* Csak virtuális kurzoron keresztül működik */
        }

        #igen {
            background: #ff69b4;
            color: white;
            box-shadow: 0 4px 15px rgba(255,105,180,0.4);
        }

        #nem {
            background: #ccc;
            color: black;
        }

        /* ===== VIRTUÁLIS KURZOR ===== */
        #virtualis-kurzor {
            width: 24px;
            height: 24px;
            background: rgba(255, 105, 180, 0.8);
            border: 2px solid #c2185b;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: background 0.2s;
            box-shadow: 0 0 10px rgba(255,105,180,0.5);
        }

        /* ===== VENTILLÁTOR ===== */
        #ventilator {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 70px;
            z-index: 500;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
            display: none;
        }

        .forog {
            animation: forog 0.2s linear infinite;
            display: inline-block;
        }

        @keyframes forog {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== TOUCHPAD ===== */
        #touchpad-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 1000;
        }

        #touchpad {
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(194, 24, 91, 0.4);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(194, 24, 91, 0.4);
            font-size: 13px;
        }

        /* ===== CLICK GOMB ===== */
        #click-btn-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: none;
            z-index: 1000;
        }

        #click-btn {
            width: 90px;
            height: 90px;
            background: rgba(255, 105, 180, 0.85);
            border: 3px solid #c2185b;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(255,105,180,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        #click-btn:active {
            transform: scale(0.9);
            background: rgba(194, 24, 91, 0.9);
        }

        /* ===== SIKER KÉPERNYŐ ===== */
        #siker {
            display: none;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        #siker h1 {
            font-size: 36px;
            color: #c2185b;
        }

        /* ===== KONFETTI ===== */
        .konfetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: esik 3s ease-in forwards;
            z-index: 9998;
        }

        @keyframes esik {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ===== HOVER EFFEKT JELZÉS ===== */
        #virtualis-kurzor.hover {
            background: rgba(194, 24, 91, 0.9);
            transform: translate(-50%, -50%) scale(1.3);
        }
    </style>
</head>
<body>

<!-- Kérdés oldal -->
<div class="kerdes-box" id="kerdes-oldal">
    <h1 id="kerdes-szoveg">Betöltés...</h1>
    <div class="gombok">
        <button class="valasz-btn" id="igen">Igen 💖</button>
        <button class="valasz-btn" id="nem">Nem</button>
    </div>
</div>

<!-- Siker képernyő -->
<div id="siker">
    <h1>Tudtam hogy okos vagy! 🎉</h1>
    <p style="font-size:24px; margin-top:20px;">❤️🌹❤️</p>
    <p style="font-size:18px; color:#c2185b; margin-top:15px;">Ez lesz a legjobb randi! 😍</p>
</div>

<!-- Virtuális kurzor -->
<div id="virtualis-kurzor"></div>

<!-- Ventillátor -->
<div id="ventilator">
    <span class="forog">🌀</span>
</div>

<!-- Touchpad (jobb oldal) -->
<div id="touchpad-container">
    <div id="touchpad">mozgasd</div>
</div>

<!-- Click gomb (bal oldal) -->
<div id="click-btn-container">
    <div id="click-btn">CLICK</div>
</div>

<script>
    // ===== KÉRDÉSEK =====
    const kerdesek = [
        "Klassz vagy? 😎",
        "Szeretsz kalandokat? 🌟",
        "Hiszel a sorsban? ✨",
        "Eljössz velem randira? 🌹"
    ];

    let aktualisKerdes = 0;
    let utolsoKerdes = false;

    // ===== VIRTUÁLIS KURZOR POZÍCIÓ =====
    let kursorX = window.innerWidth / 2;
    let kursorY = window.innerHeight / 2;
    const virtualisKurzor = document.getElementById('virtualis-kurzor');

    // ===== TOUCHPAD VÁLTOZÓK =====
    let touchAktiv = false;
    let touchStartX = 0;
    let touchStartY = 0;
    const erzekenyeseg = 1.8; // Mozgás gyorsasága

    // ===== VENTILLÁTOR VÁLTOZÓK =====
    let ventAktiv = false;
    const ventEro = 3.5; // Mennyire fújja el

    // ===== ELEMEK =====
    const igenGomb = document.getElementById('igen');
    const nemGomb = document.getElementById('nem');
    const ventilator = document.getElementById('ventilator');
    const touchpad = document.getElementById('touchpad');
    const touchpadContainer = document.getElementById('touchpad-container');
    const clickBtnContainer = document.getElementById('click-btn-container');
    const clickBtn = document.getElementById('click-btn');

    // ===== TELEFON DETEKTÁLÁS =====
    const isTelefon = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    if (isTelefon) {
        touchpadContainer.style.display = 'flex';
        clickBtnContainer.style.display = 'flex';
    }

    // ===== KURZOR FRISSÍTÉS =====
    function kursorFrissit() {
        // Képernyőn belül tartás
        kursorX = Math.max(10, Math.min(window.innerWidth - 10, kursorX));
        kursorY = Math.max(10, Math.min(window.innerHeight - 10, kursorY));

        virtualisKurzor.style.left = kursorX + 'px';
        virtualisKurzor.style.top = kursorY + 'px';

        // Hover ellenőrzés
        const igenRect = igenGomb.getBoundingClientRect();
        const nemRect = nemGomb.getBoundingClientRect();

        const igenHover = kursorX >= igenRect.left && kursorX <= igenRect.right &&
                          kursorY >= igenRect.top && kursorY <= igenRect.bottom;

        const nemHover = kursorX >= nemRect.left && kursorX <= nemRect.right &&
                         kursorY >= nemRect.top && kursorY <= nemRect.bottom;

        if (igenHover || nemHover) {
            virtualisKurzor.classList.add('hover');
        } else {
            virtualisKurzor.classList.remove('hover');
        }

        // Ventillátor - utolsó kérdésnél fújja a kurzort az IGEN felé
        if (ventAktiv) {
            const igenKozepX = igenRect.left + igenRect.width / 2;
            const igenKozepY = igenRect.top + igenRect.height / 2;

            // Irány az IGEN gomb felé
            const dx = igenKozepX - kursorX;
            const dy = igenKozepY - kursorY;
            const tavolsag = Math.hypot(dx, dy);

            if (tavolsag > 5) {
                kursorX += (dx / tavolsag) * ventEro;
                kursorY += (dy / tavolsag) * ventEro;
            }
        }

        requestAnimationFrame(kursorFrissit);
    }

    kursorFrissit();

    // ===== ASZTALI EGÉR MOZGÁS =====
    if (!isTelefon) {
        document.addEventListener('mousemove', function(e) {
            if (!ventAktiv) {
                kursorX = e.clientX;
                kursorY = e.clientY;
            }
        });

        document.addEventListener('click', function(e) {
            clickEsemeny();
        });
    }

    // ===== TOUCHPAD LOGIKA =====
    touchpad.addEventListener('touchstart', function(e) {
        e.preventDefault();
        touchAktiv = true;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: false });

    touchpad.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (!touchAktiv) return;

        const dx = (e.touches[0].clientX - touchStartX) * erzekenyeseg;
        const dy = (e.touches[0].clientY - touchStartY) * erzekenyeseg;

        kursorX += dx;
        kursorY += dy;

        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: false });

    touchpad.addEventListener('touchend', function() {
        touchAktiv = false;
    });

    // ===== CLICK GOMB =====
    clickBtn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        clickEsemeny();
    }, { passive: false });

    // ===== CLICK ESEMÉNY LOGIKA =====
    function clickEsemeny() {
        const igenRect = igenGomb.getBoundingClientRect();
        const nemRect = nemGomb.getBoundingClientRect();

        const igenHover = kursorX >= igenRect.left && kursorX <= igenRect.right &&
                          kursorY >= igenRect.top && kursorY <= igenRect.bottom;

        const nemHover = kursorX >= nemRect.left && kursorX <= nemRect.right &&
                         kursorY >= nemRect.top && kursorY <= nemRect.bottom;

        if (igenHover) {
            if (utolsoKerdes) {
                sikerKepernyo();
            } else {
                aktualisKerdes++;
                kerdesMutat();
            }
        } else if (nemHover && !utolsoKerdes) {
            aktualisKerdes++;
            kerdesMutat();
        }
    }

    // ===== KÉRDÉS MEGJELENÍTÉS =====
    function kerdesMutat() {
        document.getElementById('kerdes-szoveg').textContent = kerdesek[aktualisKerdes];
        utolsoKerdes = aktualisKerdes === kerdesek.length - 1;

        if (utolsoKerdes) {
            // Ventillátor bekapcsol
            ventilator.style.display = 'block';
            ventAktiv = true;
            // NEM gomb elhalványul
            nemGomb.style.opacity = '0.4';
        } else {
            ventilator.style.display = 'none';
            ventAktiv = false;
            nemGomb.style.opacity = '1';
        }
    }

    // ===== SIKER KÉPERNYŐ =====
    function sikerKepernyo() {
        document.getElementById('kerdes-oldal').style.display = 'none';
        ventilator.style.display = 'none';
        touchpadContainer.style.display = 'none';
        clickBtnContainer.style.display = 'none';
        document.getElementById('siker').style.display = 'block';
        konfettiEso();
    }

    // ===== KONFETTI =====
    function konfettiEso() {
        const szinek = ['#ff69b4', '#ff1493', '#c71585', '#ffb6c1', '#ffd700'];
        for (let i = 0; i < 80; i++) {
            setTimeout(() => {
                const k = document.createElement('div');
                k.classList.add('konfetti');
                k.style.left = Math.random() * 100 + 'vw';
                k.style.background = szinek[Math.floor(Math.random() * szinek.length)];
                k.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                document.body.appendChild(k);
                setTimeout(() => k.remove(), 3500);
            }, i * 40);
        }
    }

    // ===== INDÍTÁS =====
    kerdesMutat();
</script>

</body>
</html>
